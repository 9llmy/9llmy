      <g filter="url(#strongGlow)">
        <circle cx="636" cy="524" r="20" fill="#132030" stroke="url(#accentGradient)" stroke-width="1.4">
          <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" begin="0.6s" repeatCount="indefinite"/>
        </circle>
        <text x="636" y="529" text-anchor="middle" fill="#F8FAFC">IG</text>
      </g>
      <g filter="url(#strongGlow)">
        <circle cx="692" cy="524" r="20" fill="#132030" stroke="url(#accentGradient)" stroke-width="1.4">
          <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" begin="0.9s" repeatCount="indefinite"/>
        </circle>
        <text x="692" y="529" text-anchor="middle" fill="#F8FAFC">🌐</text>
      </g>

      <text x="1132" y="529" text-anchor="end" fill="#94A3B8" font-weight="400" class="mono" font-size="12">github.com/9llmy</text>
    </g>
