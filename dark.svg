    <!-- divider -->
    <line x1="500" y1="486" x2="1132" y2="486" stroke="rgba(255,255,255,0.08)" stroke-width="1"/>

    <!-- socials -->
    <g class="sans" font-size="12" font-weight="700" opacity="0">
      <animate attributeName="opacity" values="0;1" dur="0.6s" begin="4.1s" fill="freeze"/>

      <g filter="url(#strongGlow)">
        <circle cx="524" cy="524" r="20" fill="#132030" stroke="url(#accentGradient)" stroke-width="1.4">
          <animate attributeName="stroke-opacity" values="0.6;1;0.6" dur="3s" repeatCount="indefinite"/>
        </circle>
        <text x="524" y="529" text-anchor="middle" fill="#F8FAFC">GH</text>
      </g>
      <g filter="url(#strongGlow)">
